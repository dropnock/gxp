name: gxp

x-common-env: &common-env
  GXP_DOMAIN: ${GXP_DOMAIN:-gxp.localhost}

x-postgres-common: &postgres-common
  image: postgres:16-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 10s
    timeout: 5s
    retries: 5

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # dashboard (dev only)
    volumes:
      - ../../services/gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../../services/gateway/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - gxp-net

  postgres-app:
    <<: *postgres-common
    environment:
      POSTGRES_DB: gxp_apps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-app-data:/var/lib/postgresql/data
    networks:
      - gxp-net

  postgres-workflow:
    <<: *postgres-common
    environment:
      POSTGRES_DB: gxp_workflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-workflow-data:/var/lib/postgresql/data
    networks:
      - gxp-net

  postgres-tenant:
    <<: *postgres-common
    environment:
      POSTGRES_DB: gxp_tenant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-tenant-data:/var/lib/postgresql/data
    networks:
      - gxp-net

  postgres-case:
    <<: *postgres-common
    environment:
      POSTGRES_DB: gxp_case
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-case-data:/var/lib/postgresql/data
    networks:
      - gxp-net

  postgres-document:
    <<: *postgres-common
    environment:
      POSTGRES_DB: gxp_documents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-document-data:/var/lib/postgresql/data
    networks:
      - gxp-net

  postgres-audit:
    <<: *postgres-common
    environment:
      POSTGRES_DB: gxp_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-audit-data:/var/lib/postgresql/data
    networks:
      - gxp-net

  postgres-keycloak:
    <<: *postgres-common
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    networks:
      - gxp-net

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD}"]
    volumes:
      - valkey-data:/data
    networks:
      - gxp-net
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - gxp-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: keycloak.${GXP_DOMAIN:-gxp.localhost}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ../../services/identity/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ../../services/identity/themes/gxp:/opt/keycloak/themes/gxp:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.${GXP_DOMAIN:-gxp.localhost}`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true  # dev only; enable in prod
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - gxp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav
    networks:
      - gxp-net
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3

  tika:
    image: apache/tika:2.9.2.1-full
    restart: unless-stopped
    networks:
      - gxp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9998/tika || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── Application Services ──────────────────────────────────────────────────────

  tenant-service:
    build:
      context: ../..
      dockerfile: services/tenant-service/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-tenant:5432/gxp_tenant
      APP_SERVICE_DB_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-app:5432/gxp_apps
      WORKFLOW_SERVICE_DB_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-workflow:5432/gxp_workflow
      CASE_SERVICE_DB_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-case:5432/gxp_case
      DOCUMENT_SERVICE_DB_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-document:5432/gxp_documents
      AUDIT_SERVICE_DB_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-audit:5432/gxp_audit
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OPENSEARCH_URL: http://opensearch:9200
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/6
      KEYCLOAK_REALM: gxp-platform
      CLIENT_ID: gxp-tenant-service
      CLIENT_SECRET: ${TENANT_SERVICE_CLIENT_SECRET}
    depends_on:
      postgres-tenant:
        condition: service_healthy
      valkey:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tenant-service.rule=Host(`api.${GXP_DOMAIN:-gxp.localhost}`) && PathPrefix(`/api/v1/tenants`)"
      - "traefik.http.services.tenant-service.loadbalancer.server.port=8000"

  tenant-worker:
    build:
      context: ../..
      dockerfile: services/tenant-service/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "-Q", "tenant"]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-tenant:5432/gxp_tenant
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/6
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/6
      CLIENT_ID: gxp-tenant-service
      CLIENT_SECRET: ${TENANT_SERVICE_CLIENT_SECRET}
    depends_on:
      postgres-tenant:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - gxp-net

  tenant-beat:
    build:
      context: ../..
      dockerfile: services/tenant-service/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-tenant:5432/gxp_tenant
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/6
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/6
      CLIENT_ID: gxp-tenant-service
      CLIENT_SECRET: ${TENANT_SERVICE_CLIENT_SECRET}
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - gxp-net

  app-service:
    build:
      context: ../..
      dockerfile: services/app-service/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-app:5432/gxp_apps
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      CLIENT_ID: gxp-app-service
      CLIENT_SECRET: ${APP_SERVICE_CLIENT_SECRET}
      TENANT_SERVICE_DB_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-tenant:5432/gxp_tenant
    depends_on:
      postgres-app:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-service.rule=Host(`api.${GXP_DOMAIN:-gxp.localhost}`) && PathPrefix(`/api/v1/apps`)"
      - "traefik.http.services.app-service.loadbalancer.server.port=8000"

  workflow-service:
    build:
      context: ../..
      dockerfile: services/workflow-service/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-workflow:5432/gxp_workflow
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/1
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/1
      KEYCLOAK_URL: http://keycloak:8080
      CLIENT_ID: gxp-workflow-service
      CLIENT_SECRET: ${WORKFLOW_SERVICE_CLIENT_SECRET}
    depends_on:
      postgres-workflow:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.workflow-service.rule=Host(`api.${GXP_DOMAIN:-gxp.localhost}`) && PathPrefix(`/api/v1/workflow`)"
      - "traefik.http.services.workflow-service.loadbalancer.server.port=8000"

  workflow-worker:
    build:
      context: ../..
      dockerfile: services/workflow-service/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "-Q", "workflow"]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-workflow:5432/gxp_workflow
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/1
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/1
      KEYCLOAK_URL: http://keycloak:8080
      CLIENT_ID: gxp-workflow-service
      CLIENT_SECRET: ${WORKFLOW_SERVICE_CLIENT_SECRET}
    depends_on:
      postgres-workflow:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - gxp-net

  workflow-beat:
    build:
      context: ../..
      dockerfile: services/workflow-service/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-workflow:5432/gxp_workflow
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/1
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/1
      KEYCLOAK_URL: http://keycloak:8080
      CLIENT_ID: gxp-workflow-service
      CLIENT_SECRET: ${WORKFLOW_SERVICE_CLIENT_SECRET}
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - gxp-net

  case-service:
    build:
      context: ../..
      dockerfile: services/case-service/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-case:5432/gxp_case
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/2
      KEYCLOAK_URL: http://keycloak:8080
      CLIENT_ID: gxp-case-service
      CLIENT_SECRET: ${CASE_SERVICE_CLIENT_SECRET}
      OPENSEARCH_URL: http://opensearch:9200
      WORKFLOW_SERVICE_URL: http://workflow-service:8000
      TENANT_SERVICE_DB_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-tenant:5432/gxp_tenant
    depends_on:
      postgres-case:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.case-service.rule=Host(`api.${GXP_DOMAIN:-gxp.localhost}`) && PathPrefix(`/api/v1/cases`)"
      - "traefik.http.services.case-service.loadbalancer.server.port=8000"

  document-service:
    build:
      context: ../..
      dockerfile: services/document-service/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-document:5432/gxp_documents
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/3
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/3
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      OPENSEARCH_URL: http://opensearch:9200
      TIKA_URL: http://tika:9998
      CLIENT_ID: gxp-document-service
      CLIENT_SECRET: ${DOCUMENT_SERVICE_CLIENT_SECRET}
      TENANT_SERVICE_DB_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-tenant:5432/gxp_tenant
    depends_on:
      postgres-document:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.document-service.rule=Host(`api.${GXP_DOMAIN:-gxp.localhost}`) && PathPrefix(`/api/v1/documents`)"
      - "traefik.http.services.document-service.loadbalancer.server.port=8000"

  document-worker:
    build:
      context: ../..
      dockerfile: services/document-service/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info", "-Q", "document"]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-document:5432/gxp_documents
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/3
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/3
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      OPENSEARCH_URL: http://opensearch:9200
      TIKA_URL: http://tika:9998
      CLIENT_ID: gxp-document-service
      CLIENT_SECRET: ${DOCUMENT_SERVICE_CLIENT_SECRET}
    depends_on:
      postgres-document:
        condition: service_healthy
      valkey:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - gxp-net

  audit-service:
    build:
      context: ../..
      dockerfile: services/audit-service/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-audit:5432/gxp_audit
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/4
      KEYCLOAK_URL: http://keycloak:8080
      CLIENT_ID: gxp-audit-service
      CLIENT_SECRET: ${AUDIT_SERVICE_CLIENT_SECRET}
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/4
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres-audit:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audit-service.rule=Host(`api.${GXP_DOMAIN:-gxp.localhost}`) && PathPrefix(`/api/v1/audit`)"
      - "traefik.http.services.audit-service.loadbalancer.server.port=8000"

  audit-worker:
    build:
      context: ../..
      dockerfile: services/audit-service/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "-Q", "audit"]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-audit:5432/gxp_audit
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/4
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/4
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CLIENT_ID: gxp-audit-service
      CLIENT_SECRET: ${AUDIT_SERVICE_CLIENT_SECRET}
    depends_on:
      postgres-audit:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - gxp-net

  audit-beat:
    build:
      context: ../..
      dockerfile: services/audit-service/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-audit:5432/gxp_audit
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/4
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/4
      CLIENT_ID: gxp-audit-service
      CLIENT_SECRET: ${AUDIT_SERVICE_CLIENT_SECRET}
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - gxp-net

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/5
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: gxp
      CLIENT_ID: gxp-notification-service
      CLIENT_SECRET: ${NOTIFICATION_SERVICE_CLIENT_SECRET}
      SMTP_HOST: "localhost"
      SMTP_PORT: "25"
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - gxp-net

  # ── Frontend apps ─────────────────────────────────────────────────────────────

  portal:
    build:
      context: ../..
      dockerfile: apps/portal/Dockerfile
      args:
        VITE_KEYCLOAK_URL: http://keycloak.${GXP_DOMAIN:-gxp.localhost}
        VITE_API_BASE_URL: http://api.${GXP_DOMAIN:-gxp.localhost}
    restart: unless-stopped
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`portal.${GXP_DOMAIN:-gxp.localhost}`)"
      - "traefik.http.routers.portal.entrypoints=web"
      - "traefik.http.services.portal.loadbalancer.server.port=80"

  runtime:
    build:
      context: ../..
      dockerfile: apps/runtime/Dockerfile
      args:
        VITE_API_BASE_URL: http://api.${GXP_DOMAIN:-gxp.localhost}
    restart: unless-stopped
    networks:
      - gxp-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.runtime.rule=Host(`runtime.${GXP_DOMAIN:-gxp.localhost}`)"
      - "traefik.http.routers.runtime.entrypoints=web"
      - "traefik.http.services.runtime.loadbalancer.server.port=80"

networks:
  gxp-net:
    driver: bridge

volumes:
  postgres-tenant-data:
  postgres-app-data:
  postgres-workflow-data:
  postgres-case-data:
  postgres-document-data:
  postgres-audit-data:
  postgres-keycloak-data:
  valkey-data:
  minio-data:
  opensearch-data:
  clamav-data:
