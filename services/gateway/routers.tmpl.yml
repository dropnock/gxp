http:
  routers:
    keycloak:
      rule: "Host(`keycloak.${GXP_DOMAIN}`)"
      entryPoints: [websecure]
      tls: {}
      service: keycloak

    # Uncomment each block as its service is brought up

    # portal:
    #   rule: "Host(`portal.${GXP_DOMAIN}`)"
    #   entryPoints: [websecure]
    #   tls: {}
    #   service: portal

    # runtime:
    #   rule: "Host(`runtime.${GXP_DOMAIN}`)"
    #   entryPoints: [websecure]
    #   tls: {}
    #   service: runtime

    minio-console:
      rule: "Host(`minio.${GXP_DOMAIN}`)"
      entryPoints: [websecure]
      tls: {}
      service: minio-console

    # api:
    #   rule: "Host(`api.${GXP_DOMAIN}`)"
    #   entryPoints: [websecure]
    #   middlewares: [secure-headers, rate-limit]
    #   tls: {}
    #   service: tenant-service   # swap for a weighted round-robin once multiple API services are live

  services:
    keycloak:
      loadBalancer:
        servers:
          - url: "http://keycloak:8080"

    # portal:
    #   loadBalancer:
    #     servers:
    #       - url: "http://portal:80"

    # runtime:
    #   loadBalancer:
    #     servers:
    #       - url: "http://runtime:80"

    minio-console:
      loadBalancer:
        servers:
          - url: "http://minio:9001"

