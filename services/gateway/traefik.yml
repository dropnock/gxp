global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true  # dev only — lock down in prod

entryPoints:
  web:
    address: ":80"
  # websecure is unused in dev — no TLS certificates are configured.
  # In production, replace this block with a real cert resolver (e.g. ACME / Let's Encrypt
  # or a mounted certificate) and re-enable the HTTP→HTTPS redirect on the web entrypoint.
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: gxp-net
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog: {}
