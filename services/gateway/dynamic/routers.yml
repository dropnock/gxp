http:
  routers:
    # All API traffic requires JWT auth
    api-catchall:
      rule: "HostRegexp(`api\\..*`) && PathPrefix(`/api/`)"
      entryPoints:
        - websecure
      middlewares:
        - secure-headers
        - rate-limit
      service: noop
      tls: {}

  services:
    noop:
      loadBalancer:
        servers: []
