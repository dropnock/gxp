http:
  routers:
    # All API traffic requires JWT auth
    api-catchall:
      rule: "HostRegexp(`api\\..*`) && PathPrefix(`/api/`)"
      entryPoints:
        - web
      middlewares:
        - secure-headers
        - rate-limit
      service: noop  # individual services registered via Docker labels

  services:
    noop:
      loadBalancer:
        servers: []
