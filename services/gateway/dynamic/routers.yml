http:
  middlewares:
    jwt-auth:
      forwardAuth:
        address: "http://auth-checker:9000/verify"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Roles"
          - "X-Request-Id"

    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
